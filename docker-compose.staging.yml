services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1 -Q celery,processing,maintenance
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: "1"

  celery-beat:
    volumes: []
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  frontend:
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          memory: 128M
